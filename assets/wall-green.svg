<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060908"/>
      <stop offset="45%" stop-color="#0c1410"/>
      <stop offset="100%" stop-color="#101915"/>
    </linearGradient>
    <radialGradient id="bloom-left" cx="28%" cy="34%" r="48%">
      <stop offset="0%" stop-color="#2f5f43" stop-opacity="0.92"/>
      <stop offset="55%" stop-color="#183223" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#0a110d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloom-right" cx="78%" cy="30%" r="44%">
