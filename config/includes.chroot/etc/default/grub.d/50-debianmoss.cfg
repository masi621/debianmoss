GRUB_TIMEOUT=6
GRUB_TIMEOUT_STYLE=menu
GRUB_DISTRIBUTOR="DebianMOSS"
GRUB_DISABLE_RECOVERY=true
GRUB_DISABLE_SUBMENU=y
GRUB_GFXMODE=1920x1080,1600x900,1366x768,1280x720,1024x768,auto
GRUB_GFXPAYLOAD_LINUX=keep
GRUB_FONT=/boot/grub/themes/debianmoss/dejavu_16.pf2
GRUB_THEME=/boot/grub/themes/debianmoss/theme.txt
GRUB_BACKGROUND=/boot/grub/themes/debianmoss/background.png
GRUB_CMDLINE_LINUX_DEFAULT="quiet splash loglevel=3 rd.systemd.show_status=false vt.global_cursor_default=0"
